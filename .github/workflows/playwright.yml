name: Playwright Tests
on:
  push:
    branches: [ main, Dev ]
  pull_request:
    branches: [ main, Dev ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # Clones the repo. You are now at the repo root.

    # --- BACKEND SETUP ---
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Backend Dependencies
      run: |
        cd backend             # Navigates from root into backend
        python -m venv venv
        ./venv/bin/pip install -r requirements.txt
        ./venv/bin/python manage.py migrate

    # --- FRONTEND SETUP ---
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Frontend Dependencies
      run: |
        cd frontend            # Navigates from root into frontend
        npm ci

    - name: Install Playwright Browsers
      run: |
        cd frontend            # Navigates from root into frontend
        npx playwright install --with-deps

    # --- RUN THE TESTS ---
    - name: Run Playwright tests
      run: |
        cd frontend            # Playwright must be triggered from the frontend folder
        npx playwright test
